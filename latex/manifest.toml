name = "latex"
display_name = "LaTeX Language Support"
description = "LSP (texlab), build tools, PDF viewing, and document navigation for LaTeX"
version = "1.0.0"
file_extensions = [".tex", ".bib", ".cls", ".sty", ".dtx", ".ltx"]
language_ids = ["latex", "bibtex"]
scripts = ["latex.lua"]
workspace_markers = [".latexmkrc", "latexmkrc", "main.tex"]

[lsp]
binary = "texlab"
install = "cargo install --git https://github.com/latex-lsp/texlab"
install_linux = "cargo install --git https://github.com/latex-lsp/texlab"
install_macos = "brew install texlab"
fallback_binaries = ["digestif"]
args = []

[comment]
line = "%"

[[settings]]
key = "pdf_viewer"
label = "PDF Viewer"
description = "Command used to open compiled PDFs (empty = system default)"
type = "string"
default = ""

[[settings]]
key = "build_on_save"
label = "Build on Save"
description = "Automatically compile when saving .tex files"
type = "bool"
default = "false"

[[settings]]
key = "build_engine"
label = "Build Engine"
description = "LaTeX compilation engine"
type = "enum"
options = ["pdflatex", "xelatex", "lualatex"]
default = "pdflatex"
