name = "yaml"
display_name = "YAML Language Support"
description = "LSP formatting and validation for YAML"
version = "1.0.0"
file_extensions = [".yml", ".yaml"]
language_ids = ["yaml"]
workspace_markers = [".github", "docker-compose.yml", "docker-compose.yaml"]

[lsp]
binary = "yaml-language-server"
install = "npm install -g yaml-language-server"
fallback_binaries = []
args = ["--stdio"]
dependencies = ["npm"]

scripts = []
