name = "lua"
display_name = "Lua Language Support"
description = "LSP intelligence for Lua via lua-language-server"
version = "1.0.0"
file_extensions = [".lua"]
language_ids = ["lua"]
workspace_markers = [".luarc.json", ".luarc.jsonc", ".luacheckrc"]

[lsp]
binary = "lua-language-server"
install = ""
install_linux = "mkdir -p ~/.local/share/lua-language-server ~/.local/bin && curl -sL \"$(curl -s https://api.github.com/repos/LuaLS/lua-language-server/releases/latest | grep browser_download_url | grep linux-x64.tar.gz | head -1 | cut -d'\"' -f4)\" | tar xz -C ~/.local/share/lua-language-server && ln -sf ~/.local/share/lua-language-server/bin/lua-language-server ~/.local/bin/lua-language-server"
install_macos = "brew install lua-language-server"
install_windows = ""
fallback_binaries = []
args = []

[comment]
line = "--"
block_open = "--[["
block_close = "]]"

scripts = []
